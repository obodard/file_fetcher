[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "file-fetcher"
version = "0.1.0"
description = "CLI tool to batch-download files from a remote SFTP server"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "paramiko>=3.4",
    "tqdm>=4.66",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[project.scripts]
file-fetcher = "file_fetcher.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
